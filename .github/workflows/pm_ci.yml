name: PMaC Continuous Integration

on:
  push:
    paths:
      - 'projects/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ☁️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: ⚙️ Run Aggregator Engine
        run: python scripts/aggregator.py

      - name: 🚀 Commit and Push Dashboard
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add DASHBOARD.md
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs(dashboard): auto-update executive summary [skip ci]" && git push)